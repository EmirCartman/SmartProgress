name: SmartProgress Deployment

on:
  push:
    branches: [ main ] # Sadece main branch'e push yapınca çalışır

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Proje klasörüne git (yoksa oluştur)
            mkdir -p ~/smartprogress
            cd ~/smartprogress
            
            # Eğer repo daha önce çekilmediyse clone yap, varsa pull yap
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git pull origin main
            fi
            
            # Docker imajlarını oluştur ve ayağa kaldır
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
            sudo docker-compose up -d --build